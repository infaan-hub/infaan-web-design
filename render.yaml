databases:
  - name: infaan-db
    databaseName: infaan_db
    user: infaan_db_user

services:
  - type: web
    name: infaan-backend
    runtime: python
    rootDir: Backend
    buildCommand: ./build.sh
    startCommand: gunicorn infaan_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.11
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "infaan-web-design.onrender.com,127.0.0.1,localhost"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://infaanwebdesign.vercel.app,http://localhost:5173"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://infaan-web-design.onrender.com,https://infaanwebdesign.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: infaan-db
          property: connectionString
      - key: SEED_INFAAN_DATA
        value: "true"

  - type: static
    name: infaan-frontend
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://infaan-web-design.onrender.com/api
