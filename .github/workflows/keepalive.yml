name: Keep Infaan Services Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend and frontend
        run: |
          curl --fail --silent --show-error --max-time 30 https://infaan-web-design.onrender.com/api/keepalive/
          curl --fail --silent --show-error --max-time 30 https://infaanwebdesign.vercel.app/
