app = "infaan-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_DEBUG = "False"
  PORT = "8080"
  SEED_INFAAN_DATA = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
