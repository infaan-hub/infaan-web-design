app = "infaan-web-design"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  ALLOWED_HOSTS = "infaan-web-design.fly.dev,localhost,127.0.0.1"
  CSRF_TRUSTED_ORIGINS = "https://infaan-web-design.fly.dev,https://infaanwebdesign.vercel.app"
  DJANGO_DEBUG = "False"
  PORT = "8080"
  SEED_INFAAN_DATA = "true"
  SYSTEM_SUBSCRIPTION_API_URL = "https://infaan-web-design.fly.dev/api"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
